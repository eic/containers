  - py-awkward
  - py-bokeh
  - py-boost-histogram
  - py-dask
  - py-dask-histogram
  - py-eic-rucio-policy-package
  - py-epic-capybara
  - py-graphviz
  - py-hepunits
  - py-hist
  - py-histoprint
  - py-ipython
  - py-jinja2
  - py-jinja2-cli
  - py-jupyter-console
  - py-jupyterlab
  - py-keras
  - py-lmfit
  - py-lxml
  - py-matplotlib
  - py-mplhep
  - py-htgettoken
  - py-numba
  - py-numpy
  - py-onnx
  - py-onnxruntime
  - py-pandas
  - py-particle
  - py-pip
  - py-pre-commit
  - py-rucio-clients
  - py-scipy
  - py-seaborn
  - py-tensorflow +cuda
