spack:
  include:
  - ../concretizer.yaml
  - ../config.yaml
  - ../env_vars.yaml
  - ../packages.yaml
  - ../view.yaml
  concretizer:
    duplicates:
      max_dupes:
        llvm: 2  # py-llvmlite needs a different llvm from external
