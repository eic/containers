    - +atomic +chrono +context +date_time +exception +fiber +filesystem +graph
    - +iostreams +locale +log +math +program_options +python +random +regex
    - +serialization +system +test +thread +timer +wave
    - cxxstd=20
  c:
    prefer:
    - gcc
    require:
    - gcc
  cxx:
