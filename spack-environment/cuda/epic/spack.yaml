spack:
  include:
  - ../../concretizer.yaml
  - ../../config.yaml
  - ../../packages.yaml
  - ../../view.yaml
  include_concrete:
  - /opt/spack-environment/cuda
  concretizer:
    duplicates:
      max_dupes:
        epic: 10
        llvm: 2
        py-setuptools: 2
        py-urllib3: 2
  specs:
  - algorithms
  - edm4eic
  - eicrecon
  - epic@main # EPIC_VERSION
  - epic@26.02.0
  - epic@26.03.0
  - epic@26.03.1
  - epic@26.04.0
  - epic@26.04.1
  - epic@26.05.0
  - juggler
