spack:
  include:
  - ../spack.lock
  - ../../concretizer.yaml
  - ../../config.yaml
  - ../../packages.yaml
  - ../../view.yaml
  concretizer:
    unify: when_possible
    duplicates:
      max_dupes:
        epic: 10
  packages:
    geant4:
      prefer:
      - +opengl
  specs:
  - algorithms
  - edm4eic
  - eicrecon
  - epic@main # EPIC_VERSION
  - epic@26.03.0
  - epic@26.03.1
  - epic@26.04.0
  - epic@26.04.1
  - epic@26.05.0
  - epic@26.06.0
  - juggler
