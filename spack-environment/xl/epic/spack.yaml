spack:
  include:
  - ../../concretizer.yaml
  - ../../packages.yaml
  - ../../view.yaml
  include_concrete:
  - /opt/spack-environment/xl
  concretizer:
    unify: when_possible # multiple epic versions
  packages:
    geant4:
      require:
      - +opengl
  specs:
  - algorithms
  - edm4eic
  - eicrecon
  - epic@main # EPIC_VERSION
  - epic@26.01.0
  - epic@26.02.0
  - epic@26.03.0
  - epic@26.03.1
  - epic@26.04.0
  - juggler
